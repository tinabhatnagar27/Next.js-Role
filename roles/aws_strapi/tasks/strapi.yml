---
- name: Ensure Strapi project directory exists
  file:
    path: /home/nodeapp/my-strapi-project
    state: directory
    owner: nodeapp
    group: nodeapp
    mode: '0755'

- name: Ensure Strapi config directory exists
  file:
    path: /home/nodeapp/my-strapi-project/config
    state: directory
    owner: nodeapp
    group: nodeapp
    mode: '0755'

- name: Create package.json for Strapi
  copy:
    dest: /home/nodeapp/my-strapi-project/package.json
    owner: nodeapp
    group: nodeapp
    mode: '0644'
    content: |
      {
        "name": "strapi-app",
        "private": true,
        "scripts": {
          "develop": "strapi develop",
          "start": "strapi start",
          "build": "strapi build"
        },
        "dependencies": {
          "@strapi/strapi": "5.0.0",
          "pg": "^8.11.0",
          "esbuild": "^0.21.5",
          "zod": "^3.23.8",
          "react": "^18.2.0",
          "react-dom": "^18.2.0",
          "react-router-dom": "^6.22.3",
          "styled-components": "^6.1.8"
        }
      }

- name: Remove node_modules
  file:
    path: /home/nodeapp/my-strapi-project/node_modules
    state: absent

- name: Remove package-lock.json
  file:
    path: /home/nodeapp/my-strapi-project/package-lock.json
    state: absent

- name: Install Strapi dependencies
  command: npm install --legacy-peer-deps --force
  args:
    chdir: /home/nodeapp/my-strapi-project

- name: Configure Strapi database (RDS PostgreSQL)
  template:
    src: database.js.j2
    dest: /home/nodeapp/my-strapi-project/config/database.js

- name: Build Strapi
  command: npm run build
  args:
    chdir: /home/nodeapp/my-strapi-project

- name: Copy Strapi systemd service
  template:
    src: strapi.service.j2
    dest: /etc/systemd/system/strapi.service

- name: Reload systemd daemon
  command: systemctl daemon-reload

- name: Enable and start Strapi service
  systemd:
    name: strapi
    enabled: yes
    state: restarted
