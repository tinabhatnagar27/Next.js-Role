---
- name: Delete previous saved package
  file:
    path: /tmp/strapi-app.zip
    state: absent

- name: Create application user
  user:
    name: nodeapp
    shell: /bin/bash
    create_home: yes
    system: yes

- name: Ensure Strapi project directory exists
  file:
    path: /home/nodeapp/my-strapi-project
    state: directory
    owner: nodeapp
    group: nodeapp
    mode: '0755'

- name: Ensure Strapi config directory exists
  file:
    path: /home/nodeapp/my-strapi-project/config
    state: directory
    owner: nodeapp
    group: nodeapp
    mode: '0755'

- name: Ensure Strapi public uploads directory exists
  file:
    path: /home/nodeapp/my-strapi-project/public/uploads
    state: directory
    owner: nodeapp
    group: nodeapp
    mode: '0755'
    recurse: yes

- name: Create package.json for Strapi
  copy:
    dest: /home/nodeapp/my-strapi-project/package.json
    owner: nodeapp
    group: nodeapp
    mode: '0644'
    content: |
      {
        "name": "strapi-app",
        "private": true,
        "scripts": {
          "develop": "strapi develop",
          "start": "strapi start",
          "build": "strapi build"
        },
        "dependencies": {
          "@strapi/strapi": "5.0.0",
          "pg": "^8.11.0",
          "esbuild": "^0.21.5",
          "zod": "^3.23.8",
          "react": "^18.2.0",
          "react-dom": "^18.2.0",
          "react-router-dom": "^6.22.3",
          "styled-components": "^6.1.8"
        }
      }

- name: Remove old node_modules
  file:
    path: /home/nodeapp/my-strapi-project/node_modules
    state: absent

- name: Remove old package-lock.json
  file:
    path: /home/nodeapp/my-strapi-project/package-lock.json
    state: absent

- name: Install Strapi dependencies
  shell: npm install --legacy-peer-deps --force
  args:
    chdir: /home/nodeapp/my-strapi-project
    executable: /bin/bash

- name: Fix project permissions
  file:
    path: /home/nodeapp/my-strapi-project
    owner: nodeapp
    group: nodeapp
    recurse: yes

- name: Configure Strapi database
  template:
    src: database.js.j2
    dest: /home/nodeapp/my-strapi-project/config/database.js
    owner: nodeapp
    group: nodeapp
    mode: '0644'

- name: Configure Strapi admin
  template:
    src: admin.js.j2
    dest: /home/nodeapp/my-strapi-project/config/admin.js
    owner: nodeapp
    group: nodeapp
    mode: '0644'

- name: Configure Strapi server
  template:
    src: server.js.j2
    dest: /home/nodeapp/my-strapi-project/config/server.js
    owner: nodeapp
    group: nodeapp
    mode: '0644'

- name: Build Strapi
  shell: npm run build
  args:
    chdir: /home/nodeapp/my-strapi-project
    executable: /bin/bash

- name: Copy Strapi systemd service
  template:
    src: strapi.service.j2
    dest: /etc/systemd/system/strapi.service

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start Strapi
  systemd:
    name: strapi
    enabled: yes
    state: restarted
